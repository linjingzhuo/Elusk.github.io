<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的心愿收款</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,sans-serif;}
        body{background:#f5f5f5;padding:20px;text-align:center;}
        .box{max-width:400px;margin:0 auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 0 10px #ddd;}
        .goods-img{width:100%;border-radius:8px;margin-bottom:15px;}
        .title{font-size:22px;color:#333;margin-bottom:10px;}
        .desc{color:#666;margin-bottom:25px;}
        .btn-group{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:30px;}
        .pay-btn{padding:12px 20px;border:none;border-radius:8px;background:#07C160;color:white;font-size:16px;}
        .mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;}
        .pay-code{background:#fff;padding:20px;border-radius:10px;}
        .pay-code img{width:260px;}
        .close{margin-top:15px;padding:8px 20px;background:#999;color:#fff;border:none;border-radius:6px;}
        .progress{margin-top:20px;padding-top:20px;border-top:1px solid #eee;}
    </style>
</head>
<body>
    <div class="box">
        < img class="goods-img" src="goods.jpg" alt="心愿商品">
        <h2 class="title">生日快乐呀！</h2>
        <p class="desc">小小心意，感谢陪伴~</p >
        <div class="btn-group">
            <button class="pay-btn" onclick="showCode()">送一颗糖 1元</button>
            <button class="pay-btn" onclick="showCode()">请你看烟花 66元</button>
            <button class="pay-btn" onclick="showCode()">生日快乐 9.9元</button>
        </div>
        <div class="progress">
            <h3>当前收款进度</h3>
            <p>累计收款：<span id="total">0</span> 元</p >
            <p>累计人数：<span id="num">0</span> 人</p >
        </div>
    </div>

    <div class="mask" id="mask">
        <div class="pay-code">
            < img src="pay.png" alt="微信收款码">
            <p style="margin:10px 0;">长按图片扫码付款</p >
            <button class="close" onclick="hideCode()">关闭</button>
        </div>
    </div>

    <script>
        function showCode(){document.getElementById('mask').style.display='flex';}
        function hideCode(){document.getElementById('mask').style.display='none';}
    </script>
</body>
</html>
